<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>搜比价 - 离线中</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
        color: #0f172a;
      }
      main {
        width: min(460px, 100%);
        padding: 28px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.8rem;
      }
      p {
        margin: 0 0 10px;
        line-height: 1.6;
        color: #475569;
      }
      a {
        display: inline-flex;
        margin-top: 10px;
        color: #1f4fd8;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>当前处于离线状态</h1>
      <p>搜比价仍会保留你已经打开过的页面外壳，但实时价格、搜索和登录需要恢复网络后继续。</p>
      <p>建议回到首页重新搜索，或稍后重新打开刚刚浏览过的商品页。</p>
      <a href="/aprice/">返回首页</a>
    </main>
  </body>
</html>
