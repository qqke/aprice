name: Deploy Astro site

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_benchmark:
        description: Run price path benchmark
        required: false
        default: "false"
        type: boolean
      bench_product_id:
        description: Product ID for benchmark
        required: false
        default: "loxonin-s"
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ASTRO_BASE_PATH: ${{ secrets.ASTRO_BASE_PATH }}
      PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
      PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
      PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.PUBLIC_TURNSTILE_SITE_KEY }}
      PUBLIC_USE_SERVER_PRICE_RPC: ${{ secrets.PUBLIC_USE_SERVER_PRICE_RPC }}
      PUBLIC_ENABLE_TELEMETRY_RPC: ${{ secrets.PUBLIC_ENABLE_TELEMETRY_RPC }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate project
        run: npm run check

      - name: Build site
        run: npm run build

      - name: Inject CNAME from secret
        run: |
          node -e "const fs=require('node:fs');const u=process.env.PUBLIC_SITE_URL||'';let host='';try{host=new URL(u).hostname.trim();}catch{}if(host && !host.endsWith('github.io')){fs.writeFileSync('dist/client/CNAME',host+'\n');console.log('Injected CNAME for',host);}else{console.log('Skip CNAME injection');}"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist/client

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  benchmark:
    if: github.event_name == 'workflow_dispatch' && inputs.run_benchmark == true
    runs-on: ubuntu-latest
    env:
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
      PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
      PUBLIC_USE_SERVER_PRICE_RPC: ${{ vars.PUBLIC_USE_SERVER_PRICE_RPC }}
      PUBLIC_ENABLE_TELEMETRY_RPC: ${{ vars.PUBLIC_ENABLE_TELEMETRY_RPC }}
      BENCH_PRODUCT_ID: ${{ inputs.bench_product_id }}
      BENCH_LIMIT: "120"
      BENCH_SINCE_DAYS: "45"
      BENCH_RADIUS_KM: "20"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Benchmark price fetch paths
        run: npm run benchmark:price
