name: Deploy Astro site

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ASTRO_BASE_PATH: ${{ secrets.ASTRO_BASE_PATH }}
      PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
      PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Inject CNAME from secret
        if: ${{ secrets.PUBLIC_SITE_URL != '' }}
        run: |
          node -e "const fs=require('node:fs');const u=process.env.PUBLIC_SITE_URL||'';let host='';try{host=new URL(u).hostname.trim();}catch{}if(host && !host.endsWith('github.io')){fs.writeFileSync('dist/client/CNAME',host+'\n');console.log('Injected CNAME for',host);}else{console.log('Skip CNAME injection');}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/client

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
